<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas para ti</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            /* Imagen de fondo 'back' con alternativas de extensión común */
            background-image: url('back.jpg'), url('back.jpeg'), url('back.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
        }

        /* --- EFECTO SOMBREADO ROJO CEREZA AL FINAL --- */
        body::after {
            content: "";
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35vh; /* Altura del sombreado */
            background: linear-gradient(to top, rgba(145, 0, 30, 0.7) 0%, rgba(145, 0, 30, 0) 100%);
            pointer-events: none;
            z-index: -1;
        }

        /* --- PANTALLA DE INICIO (OVERLAY) --- */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
            overflow: hidden;
        }

        .bg-heart {
            position: absolute;
            bottom: -50px;
            background-color: rgba(255, 105, 180, 0.4);
            display: inline-block;
            height: 30px;
            transform: rotate(-45deg);
            width: 30px;
            animation: floatHearts 10s linear infinite;
        }
        .bg-heart:before, .bg-heart:after {
            content: "";
            background-color: rgba(255, 105, 180, 0.4);
            border-radius: 50%;
            height: 30px;
            position: absolute;
            width: 30px;
        }
        .bg-heart:before { top: -15px; left: 0; }
        .bg-heart:after { left: 15px; top: 0; }

        @keyframes floatHearts {
            0% { transform: translateY(0) rotate(-45deg) scale(0.6); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(-45deg) scale(1.2); opacity: 0; }
        }

        .window-box {
            background: #ffffff;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
            z-index: 1001;
        }

        .window-box:hover {
            transform: scale(1.05);
        }

        .window-box h1 {
            font-family: 'Caveat', cursive;
            color: #ff85a2;
            font-size: 4rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 50, 100, 0.6);
            margin-bottom: 15px;
        }

        .window-box p {
            color: #333333;
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* --- SISTEMA DE CORAZONES (EMOJIS) --- */
        .heart-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; /* Detrás de las cartas */
            pointer-events: none;
        }

        .emoji-heart {
            position: absolute;
            bottom: -50px;
            user-select: none;
            animation: floatUpEmoji 10s linear infinite;
            opacity: 0;
        }

        @keyframes floatUpEmoji {
            0% { transform: translateY(0) scale(0.7) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-115vh) scale(1.3) rotate(20deg); opacity: 0; }
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .main-title {
            font-family: 'Caveat', cursive;
            font-size: 4.5rem;
            color: #ffffff;
            /* GLOW ROSA PASTEL */
            text-shadow: 0 0 10px #ffb3c1, 0 0 20px #ffb3c1, 0 0 30px #ffc6ff;
            margin-bottom: 60px;
            font-weight: 700;
        }

        /* --- CONTENEDOR DE CARTAS --- */
        .envelope-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            margin-top: 40px;
        }

        .envelope {
            width: 290px;
            height: 190px;
            position: relative;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            overflow: visible;
        }

        .envelope:hover {
            transform: translateY(-10px);
            box-shadow: 0 18px 30px rgba(0,0,0,0.45);
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 145px solid transparent;
            border-right: 145px solid transparent;
            border-top: 95px solid rgba(0, 0, 0, 0.12);
            z-index: 2;
            pointer-events: none;
            border-radius: 4px 4px 0 0;
        }

        /* Paleta de colores de los sobres */
        .env-1 { background-color: #f5ebe0; color: #6d594b; }
        .env-2 { background-color: #caf0f8; color: #0077b6; }
        .env-3 { background-color: #b7e4c7; color: #1b4332; }
        .env-4 { background-color: #fefae0; color: #bc6c25; }
        .env-5 { background-color: #e0aaff; color: #3c096c; }

        .envelope-title {
            font-family: 'Caveat', cursive;
            font-size: 1.9rem;
            z-index: 3;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .envelope-trigger {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 3;
            margin-top: 105px;
            font-weight: 600;
        }

        .heart {
            background-color: #e63946;
            display: inline-block;
            height: 26px;
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            width: 26px;
            z-index: 4;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
        .heart:before, .heart:after {
            content: "";
            background-color: #e63946;
            border-radius: 50%;
            height: 26px;
            position: absolute;
            width: 26px;
        }
        .heart:before { top: -13px; left: 0; }
        .heart:after { left: 13px; top: 0; }

        .emoji-sticker {
            position: absolute;
            font-size: 2.2rem;
            z-index: 5;
            user-select: none;
        }
        .em-top { top: -15px; left: -10px; transform: rotate(-10deg); }
        .em-bottom { bottom: -15px; right: -10px; transform: rotate(10deg); }

        /* --- MODAL PARA LA CARTA INTERNA --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: transparent;
            width: 95%;
            max-width: 550px;
            position: relative;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal.active .modal-content { transform: scale(1); }

        .close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            font-size: 2.5rem;
            cursor: pointer;
            color: #fff;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            z-index: 2010;
        }

        .letter-container-box {
            width: 100%;
            overflow-y: auto;
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        .letter-full-image {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="welcome-overlay" onclick="startApp()">
        <div class="window-box">
            <h1>Cartas para ti</h1>
            <p>Hecho con cariño, Camila ❤️</p>
        </div>
    </div>

    <!-- Contenedor Dinámico para los Emojis de Corazón -->
    <div class="heart-container" id="emoji-hearts-layer"></div>

    <!-- Contenido Principal -->
    <div class="main-content">
        <h2 class="main-title">Ábrelas cuando más lo necesites</h2>

        <div class="envelope-container">
            <!-- 1. Cumpleaños -->
            <div class="envelope env-1" onclick="openLetter(1, '#f5ebe0')">
                <div class="emoji-sticker em-top">🥳</div>
                <div class="emoji-sticker em-bottom">🎉</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">sea tu cumpleaños</span>
            </div>

            <!-- 2. Mal día -->
            <div class="envelope env-2" onclick="openLetter(2, '#caf0f8')">
                <div class="emoji-sticker em-top">😞</div>
                <div class="emoji-sticker em-bottom">😭</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">tengas un mal día</span>
            </div>

            <!-- 3. Dudes de ti -->
            <div class="envelope env-3" onclick="openLetter(3, '#b7e4c7')">
                <div class="emoji-sticker em-top">😕</div>
                <div class="emoji-sticker em-bottom">❓</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">dudes de ti</span>
            </div>

            <!-- 4. Necesites sonreír -->
            <div class="envelope env-4" onclick="openLetter(4, '#fefae0')">
                <div class="emoji-sticker em-top">😊</div>
                <div class="emoji-sticker em-bottom">☀️</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">necesites sonreír</span>
            </div>

            <!-- 5. No puedas dormir -->
            <div class="envelope env-5" onclick="openLetter(5, '#e0aaff')">
                <div class="emoji-sticker em-top">🌙</div>
                <div class="emoji-sticker em-bottom">🥱</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">no puedas dormir</span>
            </div>
        </div>
    </div>

    <!-- Modal para las cartas -->
    <div class="modal" id="letter-modal" onclick="closeLetter(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('letter-modal').classList.remove('active')">×</span>
            <div class="letter-container-box" id="letter-wrapper"></div>
        </div>
    </div>

    <script>
        // Corazones de la pantalla de bienvenida
        const overlay = document.getElementById('welcome-overlay');
        for (let i = 0; i < 15; i++) {
            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 6 + 's';
            heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
            overlay.appendChild(heart);
        }

        function startApp() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 800);
            createEmojiHearts();
        }

        // --- SISTEMA DE CORAZONES DETRÁS DE LAS CARTAS ---
        function createEmojiHearts() {
            const container = document.getElementById('emoji-hearts-layer');
            // Array con emojis en Rojo, Rosa y Rojo Intenso/Brillante
            const heartTypes = ['❤️', '💗', '💖'];
            
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                heart.classList.add('emoji-heart');
                
                // Selección aleatoria del emoji/color
                heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
                
                // Configuración de posiciones y tamaños randomizados
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.fontSize = (Math.random() * 1.5 + 1) + 'rem'; 
                heart.style.animationDelay = Math.random() * 8 + 's';
                heart.style.animationDuration = (Math.random() * 5 + 7) + 's';
                
                container.appendChild(heart);
            }
        }

        // Mapeo de imágenes
        const lettersImages = {
            1: ["cumple_parte1.jpeg", "cumple_parte2.jpeg"],
            2: ["mal_dia.jpeg"],
            3: ["dudes_de_ti.jpeg"],
            4: ["sonreir.jpeg"],
            5: ["dormir.jpeg"]
        };

        function openLetter(id, colorExacto) {
            const wrapper = document.getElementById('letter-wrapper');
            wrapper.innerHTML = "";
            
            const imgs = lettersImages[id];
            imgs.forEach(src => {
                const imgElement = document.createElement('img');
                imgElement.src = src;
                imgElement.classList.add('letter-full-image');
                imgElement.alt = "Carta";
                wrapper.appendChild(imgElement);
            });
            
            wrapper.style.border = `8px solid ${colorExacto}`;
            document.getElementById('letter-modal').classList.add('active');
        }

        function closeLetter(e) {
            if(e.target.classList.contains('modal')) {
                document.getElementById('letter-modal').classList.remove('active');
            }
        }
    </script>
</body>
</html>
