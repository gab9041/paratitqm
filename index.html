<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartas para ti</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            background: linear-gradient(to bottom, #7fc1e3 0%, #bcead5 60%, #9ede73 100%);
            position: relative;
        }

        /* --- PANTALLA DE INICIO (OVERLAY) --- */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
            overflow: hidden;
        }

        .bg-heart {
            position: absolute;
            bottom: -50px;
            background-color: rgba(255, 105, 180, 0.4);
            display: inline-block;
            height: 30px;
            transform: rotate(-45deg);
            width: 30px;
            animation: floatHearts 10s linear infinite;
        }
        .bg-heart:before, .bg-heart:after {
            content: "";
            background-color: rgba(255, 105, 180, 0.4);
            border-radius: 50%;
            height: 30px;
            position: absolute;
            width: 30px;
        }
        .bg-heart:before { top: -15px; left: 0; }
        .bg-heart:after { left: 15px; top: 0; }

        @keyframes floatHearts {
            0% { transform: translateY(0) rotate(-45deg) scale(0.6); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(-45deg) scale(1.2); opacity: 0; }
        }

        .window-box {
            background: #ffffff;
            padding: 40px 60px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
            z-index: 1001;
        }

        .window-box:hover {
            transform: scale(1.05);
        }

        .window-box h1 {
            font-family: 'Caveat', cursive;
            color: #ff85a2;
            font-size: 4rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 50, 100, 0.6);
            margin-bottom: 15px;
        }

        .window-box p {
            color: #333333;
            font-size: 1.1rem;
            font-weight: 400;
        }

        /* --- FONDO ANIMADO --- */
        .landscape-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            background: #ffffff;
            border-radius: 100px;
            opacity: 0.85;
            animation: moveClouds 25s linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }
        .cloud-1 { width: 120px; height: 40px; top: 15%; left: -150px; animation-duration: 35s; }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::after { width: 70px; height: 70px; top: -45px; left: 40px; }

        .cloud-2 { width: 180px; height: 50px; top: 25%; left: -200px; animation-duration: 45s; animation-delay: 5s; }
        .cloud-2::before { width: 70px; height: 70px; top: -35px; left: 25px; }
        .cloud-2::after { width: 90px; height: 90px; top: -55px; left: 65px; }

        @keyframes moveClouds {
            0% { left: -200px; }
            100% { left: 105vw; }
        }

        .hill {
            position: absolute;
            bottom: 0;
            width: 150%;
            border-radius: 50% 50% 0 0;
        }
        .hill-back { height: 45vh; left: -20%; background: #7bc676; opacity: 0.7; }
        .hill-front { height: 35vh; left: -10%; background: #5dbb63; }

        .grass-blade {
            position: absolute;
            bottom: 0;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 60px solid #4caf50;
            transform-origin: bottom center;
            animation: swayGrass 3s ease-in-out infinite alternate;
        }

        @keyframes swayGrass {
            0% { transform: rotate(-5deg); }
            100% { transform: rotate(8deg); }
        }

        .tree {
            position: absolute;
            bottom: 12vh;
            width: 120px;
            height: 200px;
            transform-origin: bottom center;
            animation: sway 4s ease-in-out infinite alternate;
        }
        .tree-left { left: 4%; animation-delay: 0s; }
        .tree-right { right: 4%; animation-delay: 0.5s; }

        .trunk {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 90px;
            background: #8B5A2B;
            border-radius: 4px;
        }
        .leaves {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 130px;
            background: #4eed56;
            border-radius: 50%;
            box-shadow: inset -10px -10px 0px #3cb843, 0 10px 20px rgba(0,0,0,0.1);
        }

        @keyframes sway {
            0% { transform: rotate(-3deg); }
            100% { transform: rotate(4deg); }
        }

        .dandelion-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            animation: floatUp 9s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) translateX(0) scale(0.5); opacity: 0; }
            15% { opacity: 1; }
            85% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(150px) scale(1.2); opacity: 0; }
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .main-content {
            padding: 40px 20px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .main-title {
            font-family: 'Caveat', cursive;
            font-size: 4.5rem;
            color: #000000;
            filter: drop-shadow(0 0 15px #00d2ff);
            margin-bottom: 60px;
            font-weight: 700;
        }

        /* --- CONTENEDOR DE CARTAS --- */
        .envelope-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            margin-top: 40px;
        }

        .envelope {
            width: 290px;
            height: 190px;
            position: relative;
            cursor: pointer;
            border-radius: 4px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.18);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            overflow: visible;
        }

        .envelope:hover {
            transform: translateY(-10px);
            box-shadow: 0 18px 30px rgba(0,0,0,0.25);
        }

        /* Solapa triangular */
        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 145px solid transparent;
            border-right: 145px solid transparent;
            border-top: 95px solid rgba(0, 0, 0, 0.12);
            z-index: 2;
            pointer-events: none;
            border-radius: 4px 4px 0 0;
        }

        /* Paleta de colores de los sobres */
        .env-1 { background-color: #f5ebe0; color: #6d594b; }
        .env-2 { background-color: #caf0f8; color: #0077b6; }
        .env-3 { background-color: #b7e4c7; color: #1b4332; }
        .env-4 { background-color: #fefae0; color: #bc6c25; }
        .env-5 { background-color: #e0aaff; color: #3c096c; }

        .envelope-title {
            font-family: 'Caveat', cursive;
            font-size: 1.9rem;
            z-index: 3;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .envelope-trigger {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 3;
            margin-top: 105px;
            font-weight: 600;
        }

        /* Corazón central */
        .heart {
            background-color: #e63946;
            display: inline-block;
            height: 26px;
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            width: 26px;
            z-index: 4;
            box-shadow: 0 3px 6px rgba(0,0,0,0.2);
        }
        .heart:before, .heart:after {
            content: "";
            background-color: #e63946;
            border-radius: 50%;
            height: 26px;
            position: absolute;
            width: 26px;
        }
        .heart:before { top: -13px; left: 0; }
        .heart:after { left: 13px; top: 0; }

        /* Estilo para las esquinas usando emojis */
        .emoji-sticker {
            position: absolute;
            font-size: 2.2rem;
            z-index: 5;
            user-select: none;
        }
        .em-top { top: -15px; left: -10px; transform: rotate(-10deg); }
        .em-bottom { bottom: -15px; right: -10px; transform: rotate(10deg); }

        /* --- MODAL PARA LA CARTA INTERNA --- */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: transparent;
            width: 95%;
            max-width: 550px;
            position: relative;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal.active .modal-content { transform: scale(1); }

        .close-btn {
            position: absolute;
            top: -50px;
            right: 0;
            font-size: 2.5rem;
            cursor: pointer;
            color: #fff;
            background: rgba(0,0,0,0.6);
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            z-index: 2010;
        }

        /* Contenedor con scroll que aloja las imágenes */
        .letter-container-box {
            width: 100%;
            overflow-y: auto;
            max-height: 80vh;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            background: #fff;
            display: flex;
            flex-direction: column;
        }

        .letter-full-image {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="welcome-overlay" onclick="startApp()">
        <div class="window-box">
            <h1>Cartas para ti</h1>
            <p>Hecho con cariño, Camila ❤️</p>
        </div>
    </div>

    <!-- Fondo del Paisaje -->
    <div class="landscape-bg">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="hill hill-back"></div>
        <div class="hill hill-front"></div>
        <div id="grass-layer"></div>
        <div class="tree tree-left"><div class="trunk"></div><div class="leaves"></div></div>
        <div class="tree tree-right"><div class="trunk"></div><div class="leaves"></div></div>
    </div>

    <div class="dandelion-container" id="dandelions"></div>

    <!-- Contenido Principal -->
    <div class="main-content">
        <h2 class="main-title">Ábrelas cuando más lo necesites</h2>

        <div class="envelope-container">
            <!-- 1. Cumpleaños -->
            <div class="envelope env-1" onclick="openLetter(1, '#f5ebe0')">
                <div class="emoji-sticker em-top">🥳</div>
                <div class="emoji-sticker em-bottom">🎉</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">sea tu cumpleaños</span>
            </div>

            <!-- 2. Mal día -->
            <div class="envelope env-2" onclick="openLetter(2, '#caf0f8')">
                <div class="emoji-sticker em-top">😞</div>
                <div class="emoji-sticker em-bottom">😭</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">tengas un mal día</span>
            </div>

            <!-- 3. Dudes de ti -->
            <div class="envelope env-3" onclick="openLetter(3, '#b7e4c7')">
                <div class="emoji-sticker em-top">😕</div>
                <div class="emoji-sticker em-bottom">❓</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">dudes de ti</span>
            </div>

            <!-- 4. Necesites sonreír -->
            <div class="envelope env-4" onclick="openLetter(4, '#fefae0')">
                <div class="emoji-sticker em-top">😊</div>
                <div class="emoji-sticker em-bottom">☀️</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">necesites sonreír</span>
            </div>

            <!-- 5. No puedas dormir -->
            <div class="envelope env-5" onclick="openLetter(5, '#e0aaff')">
                <div class="emoji-sticker em-top">🌙</div>
                <div class="emoji-sticker em-bottom">🥱</div>
                <span class="envelope-trigger">Abrir cuando</span>
                <div class="heart"></div>
                <span class="envelope-title">no puedas dormir</span>
            </div>
        </div>
    </div>

    <!-- Modal para visualización de las cartas completas -->
    <div class="modal" id="letter-modal" onclick="closeLetter(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn" onclick="document.getElementById('letter-modal').classList.remove('active')">×</span>
            <div class="letter-container-box" id="letter-wrapper">
                <!-- Las imágenes se insertan dinámicamente aquí -->
            </div>
        </div>
    </div>

    <script>
        // Animaciones de fondo
        const overlay = document.getElementById('welcome-overlay');
        for (let i = 0; i < 15; i++) {
            const heart = document.createElement('div');
            heart.classList.add('bg-heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 6 + 's';
            heart.style.animationDuration = (Math.random() * 4 + 6) + 's';
            overlay.appendChild(heart);
        }

        const grassLayer = document.getElementById('grass-layer');
        for(let i=0; i<80; i++) {
            const blade = document.createElement('div');
            blade.classList.add('grass-blade');
            blade.style.left = (Math.random() * 100) + 'vw';
            blade.style.bottom = (Math.random() * 15) + 'px';
            blade.style.animationDelay = (Math.random() * 2) + 's';
            blade.style.borderBottomColor = i % 2 === 0 ? '#4caf50' : '#388e3c';
            grassLayer.appendChild(blade);
        }

        function startApp() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 800);
            createDandelions();
        }

        function createDandelions() {
            const container = document.getElementById('dandelions');
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
                container.appendChild(particle);
            }
        }

        // --- MAPEO DE IMÁGENES LOCALES SIMPLIFICADO ---
        const lettersImages = {
            1: ["cumple_parte1.jpeg", "cumple_parte2.jpeg"], // Lista de 2 partes para Cumpleaños
            2: ["mal_dia.jpeg"],
            3: ["dudes_de_ti.jpeg"],
            4: ["sonreir.jpeg"],
            5: ["dormir.jpeg"]
        };

        function openLetter(id, colorExacto) {
            const wrapper = document.getElementById('letter-wrapper');
            // Limpiamos cualquier contenido previo
            wrapper.innerHTML = "";
            
            // Obtenemos el array de imágenes para este sobre
            const imgs = lettersImages[id];
            
            // Creamos dinámicamente cada imagen
            imgs.forEach(src => {
                const imgElement = document.createElement('img');
                imgElement.src = src;
                imgElement.classList.add('letter-full-image');
                imgElement.alt = "Contenido de la carta";
                wrapper.appendChild(imgElement);
            });
            
            // Aplicamos el borde del color exacto del sobre
            wrapper.style.border = `8px solid ${colorExacto}`;
            
            // Mostramos el modal
            document.getElementById('letter-modal').classList.add('active');
        }

        function closeLetter(e) {
            if(e.target.classList.contains('modal')) {
                document.getElementById('letter-modal').classList.remove('active');
            }
        }
    </script>
</body>
</html>
